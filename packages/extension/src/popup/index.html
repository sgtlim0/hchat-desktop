<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H Chat 설정</title>
  <link rel="stylesheet" href="./main.css" />
</head>
<body class="w-[400px] min-h-[500px] bg-[#F5F7FA]">
  <header class="bg-[#002C5F] text-white px-5 py-4">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-[#00AAA6] rounded-lg flex items-center justify-center font-bold text-lg">H</div>
      <div>
        <h1 class="text-base font-bold">H Chat 문서 분석</h1>
        <p class="text-xs text-white/70">AWS Bedrock 설정</p>
      </div>
    </div>
  </header>

  <main class="p-5 space-y-4">
    <section>
      <label class="block text-sm font-medium text-[#002C5F] mb-1.5" for="access-key">Access Key ID</label>
      <input
        id="access-key"
        type="password"
        placeholder="AKIA..."
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-[#00AAA6] focus:border-transparent outline-none"
      />
    </section>

    <section>
      <label class="block text-sm font-medium text-[#002C5F] mb-1.5" for="secret-key">Secret Access Key</label>
      <input
        id="secret-key"
        type="password"
        placeholder="시크릿 키 입력"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-[#00AAA6] focus:border-transparent outline-none"
      />
    </section>

    <section>
      <label class="block text-sm font-medium text-[#002C5F] mb-1.5" for="region">리전</label>
      <select
        id="region"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-[#00AAA6] focus:border-transparent outline-none bg-white"
      >
        <option value="us-east-1">US East (N. Virginia)</option>
        <option value="us-west-2">US West (Oregon)</option>
        <option value="ap-northeast-2">Asia Pacific (Seoul)</option>
      </select>
    </section>

    <section>
      <label class="block text-sm font-medium text-[#002C5F] mb-1.5" for="model">모델</label>
      <select
        id="model"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-[#00AAA6] focus:border-transparent outline-none bg-white"
      >
        <option value="sonnet-4">Claude Sonnet 4</option>
        <option value="haiku-4.5">Claude Haiku 4.5</option>
        <option value="sonnet-3.5">Claude 3.5 Sonnet</option>
        <option value="haiku-3.5">Claude 3.5 Haiku</option>
      </select>
    </section>

    <div class="flex gap-3 pt-2">
      <button
        id="btn-test"
        class="flex-1 px-4 py-2.5 bg-white border border-[#00AAA6] text-[#00AAA6] rounded-lg text-sm font-medium hover:bg-[#00AAA6]/10 transition-colors"
      >
        연결 테스트
      </button>
      <button
        id="btn-save"
        class="flex-1 px-4 py-2.5 bg-[#00AAA6] text-white rounded-lg text-sm font-medium hover:bg-[#00AAA6]/90 transition-colors"
      >
        저장
      </button>
    </div>

    <div id="status" class="hidden px-4 py-3 rounded-lg text-sm"></div>

    <div class="pt-3 border-t border-gray-200">
      <button
        id="btn-sidepanel"
        class="w-full px-4 py-2.5 bg-[#002C5F] text-white rounded-lg text-sm font-medium hover:bg-[#002C5F]/90 transition-colors"
      >
        사이드 패널 열기
      </button>
    </div>
  </main>

  <script type="module" src="./settings.ts"></script>
</body>
</html>
