<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H Chat - 문서 분석</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <!-- Header -->
  <header id="header" style="
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--hchat-navy);
    color: #fff;
  ">
    <div style="display: flex; align-items: center; gap: 10px;">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#00AAA6"/>
        <text x="6" y="20" font-size="16" font-weight="bold" fill="#fff">H</text>
      </svg>
      <span style="font-size: 16px; font-weight: 700;">H Chat</span>
    </div>
    <div style="display: flex; gap: 8px;">
      <button id="btn-history" title="분석 기록" style="
        background: none; border: none; color: #fff; cursor: pointer; padding: 4px;
      ">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </button>
      <button id="btn-settings" title="설정" style="
        background: none; border: none; color: #fff; cursor: pointer; padding: 4px;
      ">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main content area -->
  <main id="main-content" style="padding: 16px; display: flex; flex-direction: column; gap: 16px;">
    <div id="file-input-area"></div>
    <div id="file-preview-area" style="display: none;"></div>
    <div id="mode-selector-area" style="display: none;"></div>
    <div id="prompt-input-area" style="display: none;"></div>
    <div id="result-area" style="display: none;"></div>
  </main>

  <!-- History panel (overlay) -->
  <div id="history-panel" style="
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--hchat-bg);
    z-index: 100;
    flex-direction: column;
  ">
    <header style="
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--hchat-navy);
      color: #fff;
    ">
      <span style="font-size: 16px; font-weight: 700;">분석 기록</span>
      <button id="btn-history-close" style="
        background: none; border: none; color: #fff; cursor: pointer; padding: 4px;
      ">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </header>
    <div id="history-list-area" style="padding: 16px; flex: 1; overflow-y: auto;"></div>
  </div>

  <script type="module" src="./app.ts"></script>
</body>
</html>
